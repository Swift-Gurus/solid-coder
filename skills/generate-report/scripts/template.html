<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SOLID Code Review Report</title>
  <style>
/* ── Reset & Base ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  color: #1a1a2e;
  background: #f4f6fb;
}

/* ── Layout ───────────────────────────────────── */
header {
  background: #16213e;
  color: #e0e0e0;
  padding: 24px 32px;
  border-bottom: 3px solid #0f3460;
}
header h1 { font-size: 1.6rem; font-weight: 700; color: #ffffff; }
header .meta { font-size: 0.8rem; color: #8892a4; margin-top: 4px; }

#summary {
  padding: 24px 32px 0;
}

.file-section {
  background: #ffffff;
  border: 1px solid #dde3ee;
  border-radius: 8px;
  margin: 24px 32px;
  overflow: hidden;
}

/* ── Summary Table ────────────────────────────── */
.summary-table {
  width: 100%;
  border-collapse: collapse;
  background: #ffffff;
  border: 1px solid #dde3ee;
  border-radius: 8px;
  overflow: hidden;
}
.summary-table thead { background: #0f3460; color: #ffffff; }
.summary-table th { padding: 10px 16px; text-align: left; font-weight: 600; font-size: 0.82rem; letter-spacing: 0.04em; text-transform: uppercase; }
.summary-table td { padding: 10px 16px; border-bottom: 1px solid #eef1f8; }
.summary-table tbody tr:last-child td { border-bottom: none; }
.summary-table tbody tr:hover { background: #f7f9fd; }

/* ── File Header ──────────────────────────────── */
.file-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 24px;
  background: #0f3460;
  color: #ffffff;
}
.file-header h2 {
  font-size: 1rem;
  font-weight: 600;
  font-family: "SF Mono", "Fira Code", Consolas, monospace;
  color: #e8edf5;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Principle Label ──────────────────────────── */
.principle-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 0.95rem;
  padding: 16px 24px 4px;
  color: #0f3460;
  border-top: 1px solid #eef1f8;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.principle-label:first-child { border-top: none; }

/* ── Section Headings ─────────────────────────── */
.section-heading {
  font-size: 0.78rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #6b7a9a;
  padding: 12px 24px 4px;
}

/* ── Badges ───────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 12px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
}
.badge-compliant { background: #d4f5e2; color: #1a7a4a; }
.badge-minor     { background: #fff3cd; color: #856404; }
.badge-severe    { background: #fde8e8; color: #b91c1c; }

/* ── Finding Cards ────────────────────────────── */
.finding-card {
  margin: 6px 24px;
  border-radius: 6px;
  border-left: 4px solid #cbd5e1;
  background: #f8fafc;
  padding: 12px 16px;
}
.severity-severe  { border-left-color: #ef4444; background: #fff8f8; }
.severity-minor   { border-left-color: #f59e0b; background: #fffdf4; }
.severity-compliant { border-left-color: #22c55e; background: #f4fef7; }

.finding-header {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}
.finding-id {
  font-family: "SF Mono", "Fira Code", Consolas, monospace;
  font-size: 0.72rem;
  color: #6b7a9a;
  background: #eef1f8;
  padding: 1px 6px;
  border-radius: 4px;
}
.finding-title {
  font-weight: 600;
  font-size: 0.88rem;
  color: #1a1a2e;
  flex: 1;
}
.metric-tag {
  font-size: 0.70rem;
  background: #e8ecf8;
  color: #3a4a7a;
  padding: 1px 7px;
  border-radius: 4px;
  font-style: italic;
}
.finding-body p { font-size: 0.83rem; color: #374151; margin-top: 3px; }
.label { font-weight: 600; color: #4b5563; margin-right: 4px; }
.line-range { font-family: "SF Mono", "Fira Code", Consolas, monospace; font-size: 0.82rem; }

/* ── Fix Cards ────────────────────────────────── */
.fix-card {
  margin: 6px 24px 12px;
  border-radius: 6px;
  border: 1px solid #e2e8f0;
  background: #ffffff;
  padding: 14px 18px;
}
.fix-header {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.fix-id {
  font-family: "SF Mono", "Fira Code", Consolas, monospace;
  font-size: 0.72rem;
  color: #6b7a9a;
  background: #eef1f8;
  padding: 1px 6px;
  border-radius: 4px;
}
.fix-title { font-weight: 600; font-size: 0.88rem; color: #1a1a2e; flex: 1; }
.pattern-tag {
  font-size: 0.70rem;
  background: #f0e8fe;
  color: #6d28d9;
  padding: 1px 7px;
  border-radius: 4px;
}
.addresses { font-size: 0.78rem; color: #6b7a9a; margin-bottom: 8px; }
.addresses code {
  background: #eef1f8;
  padding: 1px 5px;
  border-radius: 3px;
  font-family: "SF Mono", "Fira Code", Consolas, monospace;
  font-size: 0.75rem;
}

/* ── Code Blocks ──────────────────────────────── */
.code-block {
  font-family: "SF Mono", "Fira Code", Consolas, monospace;
  font-size: 0.80rem;
  line-height: 1.5;
  background: #1e2740;
  color: #c9d1e0;
  padding: 12px 16px;
  border-radius: 5px;
  overflow-x: auto;
  white-space: pre;
  margin: 6px 0;
}

/* ── Details / Summary ────────────────────────── */
details { margin: 8px 0 4px; }
details summary {
  cursor: pointer;
  font-weight: 600;
  font-size: 0.80rem;
  color: #3a4a7a;
  padding: 4px 0;
  user-select: none;
}
details summary:hover { color: #0f3460; }
details[open] summary { margin-bottom: 6px; }

/* ── Todo List ────────────────────────────────── */
.todo-list { padding-left: 20px; margin: 4px 0; }
.todo-list li { font-size: 0.83rem; color: #374151; margin: 3px 0; }

/* ── Verification ─────────────────────────────── */
.verification {
  margin-top: 10px;
  border-top: 1px solid #eef1f8;
  padding-top: 8px;
}
.verification-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.verification-item {
  font-size: 0.75rem;
  background: #f0fdf4;
  color: #166534;
  border: 1px solid #bbf7d0;
  padding: 2px 8px;
  border-radius: 10px;
}

/* ── No Findings ──────────────────────────────── */
.no-findings {
  font-size: 0.82rem;
  color: #9ca3af;
  padding: 6px 24px 10px;
  font-style: italic;
}
  </style>
</head>
<body>
</body>
</html>
